<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPUBLICA | Intelligence Integrity Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --republic-blue: #0531ad; --republic-red: #ff2e4d; --neon: #00f2ff; }
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .view { display: none; min-height: 100vh; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-grad { background: linear-gradient(90deg, var(--republic-blue), var(--republic-red)); transition: 0.3s; cursor: pointer; }
        .btn-grad:hover { filter: brightness(1.2); transform: scale(1.05); }
        .correct { background: #10b981 !important; border-color: #059669 !important; }
        .wrong { background: #ff2e4d !important; border-color: #be123c !important; }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .admin-btn { background: #facc15; color: black; font-weight: 800; font-size: 10px; padding: 4px 8px; border-radius: 4px; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- NAVIGATION HEADER -->
    <nav id="main-nav" class="fixed top-0 w-full z-50 glass border-b border-white/10 px-6 py-4 flex justify-between items-center hidden">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.hash='#home'">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-700 via-white to-red-600"></div>
            <span class="cyber-font text-xl font-bold tracking-tighter neon-text uppercase">Republica</span>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-slate-400">
            <button onclick="window.location.hash='#home'" class="hover:text-cyan-400 transition">Accueil</button>
            <button onclick="window.location.hash='#games'" class="hover:text-cyan-400 transition">Missions</button>
            <button onclick="window.location.hash='#wiki'" class="hover:text-cyan-400 transition">Dictionnaire</button>
            <button onclick="window.location.hash='#leaderboard'" class="hover:text-cyan-400 transition">Classement</button>
        </div>
        <div class="text-right">
            <p id="nav-pseudo" class="text-xs font-bold text-cyan-400">Agent</p>
            <p id="nav-score" class="text-[10px] text-slate-500">XP: 0000</p>
        </div>
    </nav>

    <!-- VUES -->
    <main id="app-container">
        <!-- Rendu par le router -->
    </main>

    <!-- AUTHENTIFICATION -->
  <!-- AUTHENTIFICATION -->
    <section id="view-auth" class="view flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md neon-border">
            
            <!-- Onglets de basculement -->
            <div class="flex gap-2 mb-8 bg-white/5 p-1 rounded-2xl border border-white/10">
                <button id="tab-login" onclick="window.authManager.switchTab('login')" class="flex-1 py-3 rounded-xl font-bold text-xs bg-cyan-500 text-black transition-all">SE CONNECTER</button>
                <button id="tab-signup" onclick="window.authManager.switchTab('signup')" class="flex-1 py-3 rounded-xl font-bold text-xs text-gray-400 hover:text-white transition-all">S'INSCRIRE</button>
            </div>

            <h2 id="auth-title" class="cyber-font text-xl font-bold text-center mb-6 text-cyan-400">CONNEXION AU COMPTE</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 block mb-1">Pseudo Citoyen</label>
                    <input type="text" id="auth-pseudo" placeholder="Ex: Agent007" class="w-full p-4 rounded-2xl outline-none focus:border-cyan-400 transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 block mb-1">Code Secret (6 caractères min.)</label>
                    <input type="password" id="auth-pass" placeholder="••••••••" class="w-full p-4 rounded-2xl outline-none focus:border-cyan-400 transition">
                </div>
                
                <!-- Boutons d'action dynamiques -->
                <div id="action-login" class="pt-4">
                    <button onclick="window.authManager.handle('login')" class="w-full bg-cyan-500 text-black font-black py-4 rounded-2xl hover:bg-white transition shadow-lg shadow-cyan-500/20">SE CONNECTER</button>
                </div>
                <div id="action-signup" class="pt-4 hidden">
                    <button onclick="window.authManager.handle('signup')" class="w-full glass font-black py-4 rounded-2xl border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition shadow-lg">VALIDER L'INSCRIPTION</button>
                </div>
            </div>
            
            <!-- Zone d'affichage des messages d'erreur -->
            <p id="auth-error" class="text-red-500 text-[11px] text-center mt-6 font-bold uppercase tracking-wide"></p>
        </div>
    </section>

    <!-- GAME MODAL -->
    <div id="game-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/98 flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl rounded-[4rem] p-12 relative neon-border">
            <button onclick="gameEngine.quit()" class="absolute top-8 right-8 text-white/30 hover:text-white text-4xl">&times;</button>
            <div id="game-header" class="flex justify-between items-center mb-12 cyber-font text-[10px] text-slate-500 uppercase tracking-widest">
                <span id="game-title-disp">MISSION</span>
                <span id="game-progress">0 / 0</span>
            </div>
            <div id="game-content" class="text-center min-h-[400px] flex flex-col justify-center items-center"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. CONFIGURATION (Garde tes clés ici)
        const firebaseConfig = {
            apiKey: "AIzaSyBaIxbNnBHSL_UpB5LadZUsPifxriu4EkE",
            authDomain: "last-hope-60652.firebaseapp.com",
            projectId: "last-hope-60652",
            storageBucket: "last-hope-60652.firebasestorage.app",
            messagingSenderId: "503456003811",
            appId: "1:503456003811:web:9de6846020c6645ecf77d6",
        };

        const app = initializeApp(firebaseConfig);
        const fbAuth = getAuth(app);
        const db = getFirestore(app);

        // 2. DATA
        const wikiData = [
            { id: 0, term: "Désinformation", source: "UNESCO", definition: "Intention délibérée de tromper et nuire.", img: "https://image.pollinations.ai/prompt/hacker-glitch-cyan?nologo=true" },
            { id: 1, term: "Mésinformation", source: "ONU", definition: "Partage d'erreur par ignorance, sans mauvaise foi.", img: "https://image.pollinations.ai/prompt/error-screen-yellow?nologo=true" },
            { id: 2, term: "Discours de haine", source: "ONU", definition: "Attaque sur l'identité d'un groupe ou individu.", img: "https://image.pollinations.ai/prompt/broken-megaphone-red?nologo=true" },
            { id: 3, term: "Deepfake", source: "IA Lab", definition: "Manipulation vidéo/audio par intelligence artificielle.", img: "https://image.pollinations.ai/prompt/robot-face-digital?nologo=true" }
        ];

        const gamesConfig = [
            { id: "truth-lab", title: "Labo Vérité", icon: "🔬", type: "qcm", questions: [{ q: "L'intention de nuire définit la désinformation ?", a: ["Vrai", "Faux"], c: 0 }, { q: "Un internaute partage une fake news sans le savoir, c'est ?", a: ["Désinformation", "Mésinformation"], c: 1 }] },
            { id: "reflex", title: "Flash Réflexe", icon: "⚡", type: "vf", questions: [{ q: "La haine en ligne est punie par la loi.", r: true }, { q: "Un algorithme est toujours neutre.", r: false }] },
            { id: "ia-detect", title: "Cyber-Enquête", icon: "🕵️", type: "qcm", questions: [{ q: "Une image satellite sans date est une preuve fiable ?", a: ["Oui", "Non"], c: 1 }] },
            { id: "troll-hunt", title: "Alerte Troll", icon: "👾", type: "vf", questions: [{ q: "Un compte créé hier avec 10 000 tweets est suspect ?", r: true }] }
        ];

        // 3. MOTEUR DE ROUTAGE
        window.router = {
            render: () => {
                const page = window.location.hash || '#home';
                const container = document.getElementById('app-container');
                const nav = document.getElementById('main-nav');
                const authView = document.getElementById('view-auth');

                if (!window.authManager.currentUser) {
                    container.innerHTML = "";
                    authView.style.display = "flex";
                    nav.classList.add('hidden');
                    return;
                }

                authView.style.display = "none";
                nav.classList.remove('hidden');

                if (page === '#home') ui.renderHome();
                if (page === '#wiki') ui.renderWiki();
                if (page === '#games') ui.renderGames();
                if (page === '#leaderboard') leaderboard.fetch();
            }
        };

       // --- GESTIONNAIRE D'AUTHENTIFICATION ---
window.authManager = {
    currentUser: null,
    // Fonction de CONNEXION
    login: async () => {
        const p = document.getElementById('auth-pseudo').value;
        const c = document.getElementById('auth-pass').value;
        if(!p || !c) return alert("Remplis les champs");
        try {
            await signInWithEmailAndPassword(fbAuth, `${p.replace(/\s+/g, '')}@republica.io`, c);
        } catch (e) { 
            document.getElementById('auth-error').innerText = "IDENTIFIANTS INCORRECTS"; 
        }
    },
    // Fonction d'INSCRIPTION
    signup: async () => {
        const p = document.getElementById('auth-pseudo').value;
        const c = document.getElementById('auth-pass').value;
        if(p.length < 3) return alert("Pseudo trop court");
        try {
            const res = await createUserWithEmailAndPassword(fbAuth, `${p.replace(/\s+/g, '')}@republica.io`, c);
            await setDoc(doc(db, "users", res.user.uid), { pseudo: p, score: 0 });
        } catch (e) { 
            document.getElementById('auth-error').innerText = "ERREUR : COMPTE DÉJÀ EXISTANT"; 
        }
    },
    logout: () => signOut(fbAuth).then(() => window.location.hash = "#auth")
};

// --- DÉTECTEUR DE CONNEXION (CORRIGÉ) ---
onAuthStateChanged(fbAuth, async (user) => {
    if (user) {
        const d = await getDoc(doc(db, "users", user.uid));
        window.authManager.currentUser = { uid: user.uid, ...d.data() };
        
        // Mise à jour de l'interface
        document.getElementById('nav-pseudo').innerText = d.data().pseudo;
        document.getElementById('nav-score').innerText = `XP: ${d.data().score}`;
        
        // FORCE LA REDIRECTION VERS LE HUB
        window.location.hash = "#hub";
        router.render();
    } else {
        window.authManager.currentUser = null;
        window.location.hash = "#auth";
        router.render();
    }
});
                // Création d'un email virtuel pour Firebase Auth
                const email = `${p.toLowerCase()}@republica.io`;
                
                try {
                    if (mode === 'signup') {
                        const res = await createUserWithEmailAndPassword(fbAuth, email, c);
                        // Initialiser le profil dans Firestore
                        await setDoc(doc(db, "users", res.user.uid), { pseudo: p, score: 0 });
                    } else {
                        await signInWithEmailAndPassword(fbAuth, email, c);
                    }
                    err.innerText = "";
                } catch (e) {
                    err.className = "text-red-500 text-[11px] text-center mt-6 font-bold uppercase tracking-wide";
                    
                    // Détection précise des erreurs pour le mode En Ligne
                    if (e.code === 'auth/email-already-in-use') {
                        err.innerText = "⚠️ CE PSEUDO EXISTE DÉJÀ. PASSEZ EN MODE CONNEXION.";
                    } else if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') {
                        err.innerText = "⚠️ PSEUDO OU CODE SECRET INCORRECT.";
                    } else if (e.code === 'auth/network-request-failed') {
                        err.innerText = "⚠️ ERREUR RÉSEAU : VÉRIFIEZ VOTRE CONNEXION INTERNET.";
                    } else {
                        err.innerText = "⚠️ ACCÈS REFUSÉ. VÉRIFIEZ VOS RÈGLES FIREBASE.";
                        console.error("Firebase Error:", e);
                    }
                }
            },
            logout: () => signOut(fbAuth)
        };

        // 5. INTERFACE UI
        window.ui = {
            renderHome: () => {
                document.getElementById('app-container').innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen text-center p-12">
                        <h1 class="text-7xl md:text-9xl font-black cyber-font italic mb-6">CITÉ <span class="text-cyan-400">INTÈGRE</span></h1>
                        <p class="text-slate-400 text-xl max-w-3xl mb-12">Laboratoire numérique de vérification et d'esprit critique.</p>
                        <div class="flex gap-6">
                            <button onclick="window.location.hash='#games'" class="btn-grad px-12 py-5 rounded-2xl font-bold cyber-font shadow-xl">MISSIONS</button>
                            <button onclick="window.location.hash='#wiki'" class="glass border-white/20 px-12 py-5 rounded-2xl font-bold cyber-font">ARCHIVES</button>
                        </div>
                    </div>`;
            },
            renderWiki: () => {
                let html = `<div class="pt-28 p-8 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">`;
                wikiData.forEach(d => {
                    html += `
                        <div class="glass rounded-3xl overflow-hidden border border-white/5 hover:border-cyan-400 transition-all flex flex-col">
                            <div class="relative group h-48 bg-black">
                                <img id="img-${d.id}" src="${d.img}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all">
                                ${window.authManager.isAdmin ? `<button onclick="ui.changeImage(${d.id})" class="admin-btn absolute top-2 right-2">MODIFIER IMAGE</button>` : ''}
                            </div>
                            <div class="p-6">
                                <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">${d.source}</span>
                                <h3 class="text-2xl font-bold mb-2 cyber-font">${d.term}</h3>
                                <p class="text-sm text-slate-400">${d.definition}</p>
                            </div>
                        </div>`;
                });
                document.getElementById('app-container').innerHTML = html + `</div>`;
            },
            changeImage: (id) => {
                const newUrl = prompt("Entrez l'URL de la nouvelle image (ou un prompt Pollinations) :");
                if(newUrl) {
                    const imgEl = document.getElementById(`img-${id}`);
                    imgEl.src = newUrl;
                    wikiData[id].img = newUrl; // Sauvegarde locale
                }
            },
            renderGames: () => {
                let html = `<div class="pt-28 p-8 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">`;
                gamesConfig.forEach((g, i) => {
                    html += `
                        <div onclick="gameEngine.start(${i})" class="glass p-10 rounded-[3rem] cursor-pointer border border-white/5 hover:neon-border text-center transition-all group">
                            <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">${g.icon}</div>
                            <h3 class="cyber-font text-2xl font-bold mb-2">${g.title}</h3>
                            <button class="bg-cyan-500/10 text-cyan-400 text-[10px] font-black px-6 py-2 rounded-full uppercase">Lancer</button>
                        </div>`;
                });
                document.getElementById('app-container').innerHTML = html + `</div>`;
            }
        };

        // 6. GAME ENGINE
        window.gameEngine = {
            currentQ: 0, score: 0, config: null,
            start: (idx) => {
                gameEngine.config = gamesConfig[idx];
                gameEngine.currentQ = 0; gameEngine.score = 0;
                document.getElementById('game-modal').classList.remove('hidden');
                gameEngine.renderNext();
            },
            renderNext: () => {
                const cont = document.getElementById('game-content');
                const cfg = gameEngine.config;
                if(gameEngine.currentQ >= cfg.questions.length) return gameEngine.end();

                const q = cfg.questions[gameEngine.currentQ];
                document.getElementById('game-title-disp').innerText = cfg.title.toUpperCase();
                document.getElementById('game-progress').innerText = `${gameEngine.currentQ + 1} / ${cfg.questions.length}`;

                if(cfg.type === 'qcm') {
                    cont.innerHTML = `
                        <h2 class="text-3xl font-bold mb-10 leading-tight">${q.q}</h2>
                        <div class="grid grid-cols-1 gap-4 w-full">
                            ${q.a.map((ans, i) => `<button onclick="gameEngine.check(${i})" class="p-5 glass rounded-2xl font-bold hover:bg-white hover:text-black transition">${ans}</button>`).join('')}
                        </div>`;
                } else {
                    cont.innerHTML = `
                        <h2 class="text-3xl font-bold mb-12">${q.q}</h2>
                        <div class="flex gap-6 w-full max-w-md">
                            <button onclick="gameEngine.check(true)" class="flex-1 p-10 bg-green-500/20 border border-green-500 rounded-3xl text-2xl font-black">VRAI</button>
                            <button onclick="gameEngine.check(false)" class="flex-1 p-10 bg-red-500/20 border border-red-500 rounded-3xl text-2xl font-black">FAUX</button>
                        </div>`;
                }
            },
            check: (val) => {
                const q = gameEngine.config.questions[gameEngine.currentQ];
                const isCorrect = (gameEngine.config.type === 'qcm') ? (val === q.c) : (val === q.r);
                const modal = document.getElementById('game-modal');
                
                if(isCorrect) { gameEngine.score += 100; modal.classList.add('correct'); }
                else modal.classList.add('wrong');

                setTimeout(() => {
                    modal.classList.remove('correct', 'wrong');
                    gameEngine.currentQ++;
                    gameEngine.renderNext();
                }, 600);
            },
            end: async () => {
                document.getElementById('game-content').innerHTML = `
                    <h2 class="cyber-font text-5xl text-cyan-400 mb-6 italic">MISSION RÉUSSIE</h2>
                    <p class="text-2xl mb-8">+ ${gameEngine.score} XP GAGNÉS</p>
                    <button onclick="gameEngine.quit()" class="bg-white text-black font-black px-10 py-4 rounded-full font-bold">RETOUR HUB</button>`;
                
                if(window.authManager.currentUser) {
                    await updateDoc(doc(db, "users", window.authManager.currentUser.uid), {
                        score: increment(gameEngine.score)
                    });
                }
            },
            quit: () => {
                document.getElementById('game-modal').classList.add('hidden');
                document.getElementById('game-content').innerHTML = "";
            }
        };

        window.leaderboard = {
            fetch: () => {
                const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
                onSnapshot(q, (snap) => {
                    document.getElementById('app-container').innerHTML = `
                        <div class="pt-28 p-8 max-w-2xl mx-auto">
                            <h2 class="cyber-font text-4xl text-center mb-12 neon-text">CLASSEMENT MONDIAL</h2>
                            <div class="space-y-4">
                                ${snap.docs.map((doc, i) => `
                                    <div class="glass p-5 rounded-3xl flex justify-between items-center ${i === 0 ? 'border-cyan-400' : 'border-white/5'}">
                                        <span class="cyber-font text-slate-500 text-xl">#${i+1}</span>
                                        <span class="font-bold text-lg uppercase">${doc.data().pseudo}</span>
                                        <span class="cyber-font text-cyan-400">${doc.data().score} XP</span>
                                    </div>`).join('')}
                            </div>
                        </div>`;
                });
            }
        };

        window.addEventListener('hashchange', router.render);
        router.render();
    </script>
</body>
</html>
