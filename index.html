<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPUBLICA | Intelligence Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --bg: #030712; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .view { display: none; min-height: 100vh; padding-top: 100px; }
        .view.active { display: block; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .btn-cyber { background: linear-gradient(90deg, #0ea5e9, #8b5cf6); transition: 0.3s; cursor: pointer; }
        .btn-cyber:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); }
        .correct { background: #10b981 !important; border-color: #059669 !important; }
        .wrong { background: #ef4444 !important; border-color: #b91c1c !important; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; text-align: center; }
        .gold-glow { text-shadow: 0 0 10px #facc15; color: #facc15; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav id="main-nav" class="fixed top-0 w-full z-50 glass border-b border-white/5 px-8 py-5 flex justify-between items-center hidden">
        <div class="flex items-center gap-3 cursor-pointer" onclick="APP.router.go('hub')">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center rotate-45">
                <span class="rotate-[-45deg] cyber-font font-black">R</span>
            </div>
            <span class="cyber-font text-xl font-black neon-text italic">REPUBLICA</span>
        </div>
        <div class="hidden lg:flex gap-10 text-[10px] font-bold uppercase tracking-widest text-slate-400">
            <button onclick="APP.router.go('hub')" class="hover:text-cyan-400 transition">Missions</button>
            <button onclick="APP.router.go('wiki')" class="hover:text-cyan-400 transition">Dictionnaire</button>
            <button onclick="APP.router.go('leaderboard')" class="hover:text-cyan-400 transition text-yellow-400">Classement</button>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right leading-none">
                <p id="nav-pseudo" class="text-xs font-bold text-cyan-400 mb-1 uppercase tracking-tighter">Agent</p>
                <p id="nav-score" class="text-sm font-black cyber-font">0000 XP</p>
            </div>
            <button onclick="APP.auth.logout()" class="p-2 glass rounded-lg border-red-500/30 hover:bg-red-500/20"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828445.png" class="w-4 invert opacity-50"></button>
        </div>
    </nav>

    <!-- VIEWS -->
    <main>
        <!-- 1. LANDING -->
        <section id="view-landing" class="view active flex flex-col items-center justify-center text-center p-6">
            <h1 class="cyber-font text-7xl md:text-9xl font-black italic mb-4 neon-text tracking-tighter">REPUBLICA</h1>
            <p class="text-xl text-slate-400 mb-12 tracking-[0.5em] uppercase font-light">Information Integrity Lab</p>
            <button onclick="APP.router.go('auth')" class="px-12 py-5 btn-cyber rounded-xl font-black cyber-font tracking-widest shadow-2xl">ACCÉDER AU TERMINAL</button>
        </section>

        <!-- 2. LOGIN -->
        <section id="view-auth" class="view flex items-center justify-center p-4">
            <div class="glass p-12 rounded-[3rem] w-full max-w-md neon-border text-center">
                <h2 class="cyber-font text-3xl font-black mb-10 neon-text">IDENTIFICATION</h2>
                <input type="text" id="auth-pseudo" placeholder="NOM D'AGENT" class="w-full p-5 rounded-2xl outline-none mb-6 cyber-font text-lg border-white/10">
                <button onclick="APP.auth.login()" class="w-full bg-white text-black font-black py-5 rounded-2xl cyber-font hover:bg-cyan-400 transition-all">LANCER LA SESSION</button>
            </div>
        </section>

        <!-- 3. HUB -->
        <section id="view-hub" class="view p-6 md:p-12">
            <div class="max-w-7xl mx-auto">
                <h2 class="cyber-font text-4xl mb-12 italic border-l-8 border-cyan-400 pl-6 uppercase font-black">Unités d'Intervention</h2>
                <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <!-- 4. WIKI -->
        <section id="view-wiki" class="view p-6 md:p-12">
            <div class="max-w-7xl mx-auto">
                <h2 class="cyber-font text-5xl mb-12 italic text-center neon-text uppercase font-black">Base de Données EMI</h2>
                <div id="wiki-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <!-- 5. LEADERBOARD -->
        <section id="view-leaderboard" class="view p-6 md:p-12">
            <div class="max-w-2xl mx-auto">
                <h2 class="cyber-font text-4xl text-center mb-12 gold-glow uppercase font-black tracking-tighter">Hall of Fame</h2>
                <div id="leaderboard-list" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <!-- MODAL DE JEU -->
    <div id="game-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/98 flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl rounded-[4rem] p-12 relative neon-border">
            <button onclick="APP.game.quit()" class="absolute top-8 right-10 text-white/30 hover:text-white text-5xl">&times;</button>
            <div class="flex justify-between items-center mb-12 cyber-font text-[10px] text-slate-500 tracking-widest uppercase font-bold border-b border-white/5 pb-6">
                <span id="game-title-disp">CASE_FILE</span>
                <span id="game-progress" class="text-white">CHUNK: 0/0</span>
            </div>
            <div id="game-content" class="text-center min-h-[400px] flex flex-col justify-center items-center"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // DATA - 30 DEFINITIONS
        // ==========================================
        const wikiData = [
            { term: "Désinformation", source: "UNESCO 222 EX/16", definition: "Information inexacte destinée à tromper et nuire. Des mensonges transformés en armes." },
            { term: "Mésinformation", source: "ONU #NonÀLaHaine", definition: "Diffusion involontaire d'informations inexactes partagées de bonne foi. Pollution involontaire." },
            { term: "Discours de Haine", source: "ONU", definition: "Communication attaquant l'identité d'un groupe (religion, ethnie, genre)." },
            { term: "MIL (EMI)", source: "UNESCO", definition: "Éducation aux Médias et à l'Information pour renforcer la résilience critique." },
            { term: "Deepfake", source: "IA Lab", definition: "Vidéo ou audio généré par IA imitant parfaitement une personne pour manipuler." },
            { term: "Fact-checking", source: "Journalisme", definition: "Processus rigoureux de vérification des preuves par des experts." },
            { term: "Bulle de filtre", source: "UNESCO", definition: "Isolement algorithmique enfermant l'utilisateur dans ses propres opinions." },
            { term: "Algorithme", source: "UNESCO", definition: "Règles informatiques de tri privilégiant souvent l'engagement émotionnel." },
            { term: "Viralité", source: "Analyse Web", definition: "Propagation ultra-rapide d'un contenu, favorisant souvent l'intox." },
            { term: "Clickbait", source: "Glossaire", definition: "Pute-à-clic. Titre trompeur conçu pour générer des revenus publicitaires." },
            { term: "Pluralisme", source: "Constitution", definition: "Existence de courants d'opinion différents garantissant la démocratie." },
            { term: "Souveraineté", source: "Droit", definition: "Capacité d'un État à réguler son espace et ses données numériques." },
            { term: "Dignité Humaine", source: "ONU", definition: "Valeur absolue de l'individu que la haine cherche à détruire." },
            { term: "Neutralité", source: "Droit Web", definition: "Principe garantissant le traitement égal de tous les flux de données." },
            { term: "RGPD", source: "Europe", definition: "Règlement protégeant les données personnelles et la vie privée." },
            { term: "Parodie", source: "Droit Presse", definition: "Utilisation de l'humour, légale tant qu'elle ne crée pas de haine." },
            { term: "Biais Cognitif", source: "Psychologie", definition: "Distorsion du jugement qui nous pousse à croire ce qui nous arrange." },
            { term: "Lanceur d'alerte", source: "Loi Sapin II", definition: "Personne révélant des faits illégaux pour l'intérêt général." },
            { term: "Chambre d'écho", source: "UNESCO", definition: "Espace où les opinions sont renforcées par répétition sans contradiction." },
            { term: "Modération", source: "Plateformes", definition: "Contrôle des contenus pour supprimer les messages illégaux." },
            { term: "Windhoek+30", source: "UNESCO", definition: "Déclaration traitant l'information comme un bien commun mondial." },
            { term: "Législation Web", source: "UNESCO", definition: "Adaptation des lois réelles à l'instantanéité des réseaux numériques." },
            { term: "Intégrité de l'Info", source: "UNESCO", definition: "Maintien de la véracité et de la transparence des données publiques." },
            { term: "Source Fiable", source: "MIL Toolkit", definition: "Origine transparente, reconnue et qui cite ses propres preuves." },
            { term: "Mentions Légales", source: "Droit Web", definition: "Informations obligatoires pour identifier le propriétaire d'un site." },
            { term: "Social Media 4 Peace", source: "UNESCO", definition: "Projet de l'ONU pour renforcer la paix via une meilleure utilisation des réseaux." },
            { term: "Civisme Numérique", source: "EMC", definition: "Respect des règles et d'autrui dans l'espace virtuel." },
            { term: "Vérification Inversée", source: "EMI Toolkit", definition: "Technique consistant à chercher l'origine d'une image pour voir si elle est détournée." },
            { term: "Data-mining", source: "Big Data", definition: "Exploitation massive de données à des fins commerciales ou politiques." },
            { term: "Infodémie", source: "OMS", definition: "Surabondance d'infos rendant difficile la compréhension d'un sujet." }
        ];

        const gamesConfig = [
            { id: "qcm-lab", title: "Labo Vérité", icon: "🔬", type: "qcm", questions: [
                { q: "Si l'intention est de nuire, c'est de la...", a: ["Mésinformation", "Désinformation", "Parodie"], c: 1 },
                { q: "Partager une erreur de bonne foi s'appelle...", a: ["Désinformation", "Mésinformation", "Cyber-crime"], c: 1 },
                { q: "L'UNESCO considère l'info comme un...", a: ["Produit", "Bien Commun", "Secret"], c: 1 }
            ]},
            { id: "vf-reflex", title: "Flash Réflexe", icon: "⚡", type: "vf", questions: [
                { q: "La haine en ligne est punie par la loi.", r: true },
                { q: "Un algorithme est toujours neutre.", r: false },
                { q: "Faire une 'Pause' est le 1er conseil de l'ONU.", r: true }
            ]},
            { id: "ia-detective", title: "Cyber-Détective", icon: "🕵️", type: "qcm", questions: [
                { q: "Une image satellite sans date est-elle une preuve fiable ?", a: ["Oui", "Non"], c: 1 },
                { q: "Une photo d'un officiel avec 6 doigts est suspecte de...", a: ["Manipulation IA", "Mauvais angle"], c: 0 }
            ]},
            { id: "vocab-master", title: "Master Vocab", icon: "✍️", type: "qcm", questions: [
                { q: "Titre pour générer du clic publicitaire ?", a: ["Pute-à-clic", "Deepfake"], c: 0 },
                { q: "Enfermement dans ses propres idées ?", a: ["Bulle de filtre", "Cité idéale"], c: 0 }
            ]}
        ];

        // ==========================================
        // ENGINE
        // ==========================================
        window.APP = {
            userData: { pseudo: "", score: 0 },

            router: {
                go: (view) => {
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    document.getElementById('view-' + view).classList.add('active');
                    const nav = document.getElementById('main-nav');
                    if (['landing', 'auth'].includes(view)) nav.classList.add('hidden');
                    else nav.classList.remove('hidden');

                    if (view === 'wiki') APP.ui.renderWiki();
                    if (view === 'hub') APP.ui.renderHub();
                    if (view === 'leaderboard') APP.ui.renderLeaderboard();
                }
            },

            auth: {
                login: () => {
                    const p = document.getElementById('auth-pseudo').value.trim().toUpperCase();
                    if (p.length < 2) return alert("Pseudo trop court !");
                    APP.userData.pseudo = p;
                    const savedScore = localStorage.getItem('republica_xp_' + p);
                    APP.userData.score = savedScore ? parseInt(savedScore) : 0;
                    document.getElementById('nav-pseudo').innerText = p;
                    APP.ui.updateScoreDisplay();
                    APP.router.go('hub');
                },
                logout: () => APP.router.go('landing')
            },

            ui: {
                updateScoreDisplay: () => {
                    document.getElementById('nav-score').innerText = APP.userData.score + " XP";
                },
                renderWiki: () => {
                    document.getElementById('wiki-grid').innerHTML = wikiData.map(d => `
                        <div class="glass p-8 rounded-[2rem] border border-white/5 hover:border-cyan-400 transition-all group">
                            <h3 class="text-xl font-black neon-text uppercase mb-2 cyber-font">${d.term}</h3>
                            <p class="text-[9px] text-cyan-500 font-bold uppercase tracking-widest mb-3">${d.source}</p>
                            <p class="text-xs text-slate-400 leading-relaxed">${d.definition}</p>
                        </div>`).join('');
                },
                renderHub: () => {
                    document.getElementById('game-grid').innerHTML = gamesConfig.map((g, i) => `
                        <div onclick="APP.game.start(${i})" class="glass p-10 rounded-[3rem] cursor-pointer border border-white/5 hover:neon-border transition-all text-center group">
                            <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">${g.icon}</div>
                            <h3 class="cyber-font text-xl font-bold mb-3">${g.title}</h3>
                            <span class="text-[9px] font-black bg-white/10 px-4 py-1 rounded-full uppercase">${g.type}</span>
                        </div>`).join('');
                },
                renderLeaderboard: () => {
                    let allUsers = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        let key = localStorage.key(i);
                        if (key.startsWith('republica_xp_')) {
                            allUsers.push({ pseudo: key.replace('republica_xp_', ''), xp: parseInt(localStorage.getItem(key)) });
                        }
                    }
                    allUsers.sort((a, b) => b.xp - a.xp);
                    document.getElementById('leaderboard-list').innerHTML = allUsers.map((u, i) => `
                        <div class="glass p-6 rounded-3xl flex justify-between items-center ${i === 0 ? 'border-yellow-500/50' : 'border-white/5'}">
                            <div class="flex items-center gap-6">
                                <span class="cyber-font text-2xl ${i === 0 ? 'gold-glow' : 'opacity-20'}">#${i+1}</span>
                                <span class="font-bold text-xl uppercase">${u.pseudo}</span>
                            </div>
                            <span class="cyber-font neon-text text-xl">${u.xp} XP</span>
                        </div>`).join('') || '<p class="text-center opacity-30">Aucun agent enregistré dans le Hall of Fame.</p>';
                }
            },

            game: {
                active: null, qIdx: 0, sessionXP: 0,
                start: (idx) => {
                    APP.game.active = gamesConfig[idx];
                    APP.game.qIdx = 0; APP.game.sessionXP = 0;
                    document.getElementById('game-modal').classList.remove('hidden');
                    APP.game.render();
                },
                render: () => {
                    const cont = document.getElementById('game-content');
                    const qData = APP.game.active.questions[APP.game.qIdx];
                    if (!qData) return APP.game.end();

                    document.getElementById('game-title-disp').innerText = APP.game.active.title.toUpperCase();
                    document.getElementById('game-progress').innerText = `DATA_CHUNK: ${APP.game.qIdx + 1}/${APP.game.active.questions.length}`;

                    if (APP.game.active.type === 'qcm') {
                        cont.innerHTML = `<h2 class="text-3xl font-black mb-12 leading-tight">${qData.q}</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full">
                                ${qData.a.map((ans, i) => `<button onclick="APP.game.check(${i})" class="p-6 glass rounded-2xl font-bold text-sm hover:bg-white hover:text-black transition-all border border-white/5">${ans}</button>`).join('')}
                            </div>`;
                    } else {
                        cont.innerHTML = `<h2 class="text-3xl font-black mb-12 leading-tight">${qData.q}</h2>
                            <div class="flex gap-8 w-full max-w-md">
                                <button onclick="APP.game.check(true)" class="flex-1 py-12 glass border-green-500/30 rounded-3xl text-2xl font-black hover:correct transition-all uppercase">Vrai</button>
                                <button onclick="APP.game.check(false)" class="flex-1 py-12 glass border-red-500/30 rounded-3xl text-2xl font-black hover:wrong transition-all uppercase">Faux</button>
                            </div>`;
                    }
                },
                check: (val) => {
                    const qData = APP.game.active.questions[APP.game.qIdx];
                    const isCorrect = (APP.game.active.type === 'qcm') ? (val === qData.c) : (val === qData.r);
                    const modal = document.getElementById('game-modal');
                    if (isCorrect) { APP.game.sessionXP += 100; modal.classList.add('correct'); }
                    else modal.classList.add('wrong');

                    setTimeout(() => {
                        modal.classList.remove('correct', 'wrong');
                        APP.game.qIdx++;
                        APP.game.render();
                    }, 600);
                },
                end: () => {
                    document.getElementById('game-content').innerHTML = `
                        <h2 class="cyber-font text-6xl neon-text mb-6 font-black italic">MISSION_SUCCESS</h2>
                        <p class="text-2xl mb-12">+ ${APP.game.sessionXP} XP COLLECTÉS SUR LE RÉSEAU</p>
                        <button onclick="APP.game.quit(true)" class="px-12 py-5 btn-cyber rounded-2xl font-black cyber-font shadow-2xl">VALIDER LES DONNÉES</button>`;
                },
                quit: (save) => {
                    if (save) {
                        APP.userData.score += APP.game.sessionXP;
                        localStorage.setItem('republica_xp_' + APP.userData.pseudo, APP.userData.score);
                        APP.ui.updateScoreDisplay();
                    }
                    document.getElementById('game-modal').classList.add('hidden');
                }
            }
        };

        APP.router.go('landing');
    </script>
</body>
</html>
